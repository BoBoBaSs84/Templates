name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Find all solutions
      id: find-solutions
      run: |
        $solutions = Get-ChildItem -Path . -Filter "*.sln" -Recurse | Select-Object -ExpandProperty FullName
        $solutionsJson = ConvertTo-Json -InputObject @($solutions) -Compress
        $solutionsJson | Out-File -FilePath solutions.json -Encoding utf8
        Write-Host "Saved solutions to solutions.json"
        Write-Host "Found solutions: $($solutions.Count)"
        $solutions | ForEach-Object { Write-Host "  $_" }
      shell: pwsh

    - name: Restore all solutions
      run: |
        if (-Not (Test-Path -Path solutions.json)) {
          Write-Host "solutions.json not found; nothing to restore."
          exit 0
        }
        $solutions = Get-Content -Raw -Path solutions.json | ConvertFrom-Json
        if ($solutions -eq $null -or $solutions.Count -eq 0) {
          Write-Host "No solutions found. Exiting."
          exit 0
        }
        foreach ($solution in $solutions) {
          Write-Host "Restoring: $solution"
          dotnet restore $solution --verbosity minimal
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        }
      shell: pwsh
    
    - name: Build all solutions
      run: |
        $solutions = Get-Content -Raw -Path solutions.json | ConvertFrom-Json
        foreach ($solution in $solutions) {
          Write-Host "Building: $solution"
          dotnet build $solution --no-restore --configuration Release --verbosity minimal
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        }
      shell: pwsh
    
    - name: Test all solutions
      run: |
        $solutions = Get-Content -Raw -Path solutions.json | ConvertFrom-Json
        foreach ($solution in $solutions) {
          Write-Host "Testing: $solution"
          dotnet test $solution --no-build --configuration Release --verbosity minimal
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        }
      shell: pwsh

    - name: Cleanup solutions file
      if: always()
      run: |
        Remove-Item -Path solutions.json -ErrorAction SilentlyContinue
      shell: pwsh
